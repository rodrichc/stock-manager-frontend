<header class="bg-dark shadow mb-4">
  
  <div class="container d-flex justify-content-between align-items-center py-3">
    
    <a class="text-white text-decoration-none fw-bold fs-3" routerLink="/" (click)="cerrarMenu()">
      Mi Portfolio
    </a>
    
    <button class="btn btn-outline-secondary text-white border-0" (click)="toggleMenu()">
      <span class="fs-4">{{ isMenuOpen() ? '✕' : '☰' }}</span>
    </button>
  </div>

  <nav class="container pb-4" [class.d-none]="!isMenuOpen()">
    
    @if (apiService.isAuthenticated()) {
      
      <div class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-4 gap-md-5 pt-4 border-top border-secondary border-opacity-25">
        
        <a class="text-white text-decoration-none opacity-75 pb-1" 
           routerLink="/" 
           routerLinkActive="opacity-100 fw-bold border-bottom border-2" 
           [routerLinkActiveOptions]="{exact: true}" 
           (click)="cerrarMenu()">Inicio</a>
           
        <a class="text-white text-decoration-none opacity-75 pb-1" 
           routerLink="/activos" 
           routerLinkActive="opacity-100 fw-bold border-bottom border-2" 
           (click)="cerrarMenu()">Mis Acciones</a>
           
        <a class="text-success text-decoration-none fw-bold pb-1" 
           routerLink="/cargar" 
           routerLinkActive="border-bottom border-2 border-success" 
           (click)="cerrarMenu()">+ Nueva Operación</a>
        
        <button class="btn btn-outline-danger px-4 rounded-pill" (click)="cerrarSesion()">
          Cerrar Sesión
        </button>

      </div>

    } @else {
      
      <div class="d-flex justify-content-center pt-4 border-top border-secondary border-opacity-25">
        <a class="btn btn-primary px-5 rounded-pill fw-bold" routerLink="/login" (click)="cerrarMenu()">
          Iniciar Sesión
        </a>
      </div>

    }
  </nav>
</header>

<div class="container">
  <router-outlet></router-outlet>
</div>
